name: CI

on:
  push:
    branches: [ main, develop, refactor--* ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+asyncpg://hnf1b_user:hnf1b_pass@localhost:5432/hnf1b_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: CI_TEST_ONLY_NOT_A_REAL_SECRET_DO_NOT_REUSE_0000000000000000
      ADMIN_PASSWORD: test-admin-password-ci-2026

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: hnf1b_user
          POSTGRES_PASSWORD: hnf1b_pass
          POSTGRES_DB: hnf1b_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hnf1b_user -d hnf1b_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        cd backend
        uv sync --group dev --group test

    - name: Run database migrations
      run: |
        cd backend
        make db-upgrade

    # Quality checks - must match the local make target exactly.
    - name: Run backend CI parity target
      run: make ci-backend

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: |
        cd frontend
        npm ci

    # Quality checks - must match the local make target exactly.
    - name: Run frontend CI parity target
      run: make ci-frontend

  e2e-tests:
    name: E2E tests (Playwright)
    needs: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25

    # Wave 6 Task 1: spin up Postgres + Redis + backend + frontend and run
    # the Playwright suite in tests/e2e/. The existing specs assume the
    # frontend is served on :5173 (Vite dev server) and the backend on
    # :8000. Playwright's webServer block in playwright.config.js starts
    # Vite; we start the backend via uvicorn as a background step.

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hnf1b_user
          POSTGRES_PASSWORD: hnf1b_pass
          POSTGRES_DB: hnf1b_phenopackets_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hnf1b_user -d hnf1b_phenopackets_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install backend dependencies
      run: |
        cd backend
        uv sync --group dev --group test

    - name: Configure production email backend for E2E CI
      run: |
        python - <<'PY'
        from pathlib import Path
        import re

        path = Path("backend/config.yaml")
        original = path.read_text()
        updated = re.sub(
            r'(^email:\n(?:^[^\S\r\n].*\n)*?^[^\S\r\n]*backend:\s*)"console"',
            r'\1"smtp"',
            original,
            count=1,
            flags=re.MULTILINE,
        )
        if updated == original:
            raise SystemExit("Failed to switch backend/config.yaml email.backend to smtp")
        path.write_text(updated)
        PY

    - name: Run backend migrations
      env:
        ENVIRONMENT: production
        AUTH_COOKIE_SECURE: "true"
        DATABASE_URL: postgresql+asyncpg://hnf1b_user:hnf1b_pass@localhost:5432/hnf1b_phenopackets_test
        JWT_SECRET: ${{ secrets.JWT_SECRET || 'CI_TEST_ONLY_NOT_A_REAL_SECRET_DO_NOT_REUSE_0000000000000000' }}
        ADMIN_PASSWORD: ci_test_admin_password_2026
        SMTP_HOST: localhost
        SMTP_USERNAME: ci
        SMTP_PASSWORD: ci-password
      run: |
        cd backend
        uv run alembic upgrade head

    - name: Seed admin user (required for E2E auth)
      env:
        ENVIRONMENT: production
        AUTH_COOKIE_SECURE: "true"
        DATABASE_URL: postgresql+asyncpg://hnf1b_user:hnf1b_pass@localhost:5432/hnf1b_phenopackets_test
        JWT_SECRET: ${{ secrets.JWT_SECRET || 'CI_TEST_ONLY_NOT_A_REAL_SECRET_DO_NOT_REUSE_0000000000000000' }}
        ADMIN_USERNAME: admin
        ADMIN_EMAIL: admin@hnf1b-db.local
        ADMIN_PASSWORD: ci_test_admin_password_2026
        SMTP_HOST: localhost
        SMTP_USERNAME: ci
        SMTP_PASSWORD: ci-password
      run: |
        cd backend
        uv run python scripts/create_admin_user.py

    - name: Start backend
      env:
        ENVIRONMENT: production
        AUTH_COOKIE_SECURE: "true"
        DATABASE_URL: postgresql+asyncpg://hnf1b_user:hnf1b_pass@localhost:5432/hnf1b_phenopackets_test
        JWT_SECRET: ${{ secrets.JWT_SECRET || 'CI_TEST_ONLY_NOT_A_REAL_SECRET_DO_NOT_REUSE_0000000000000000' }}
        ADMIN_PASSWORD: ci_test_admin_password_2026
        REDIS_URL: redis://localhost:6379/0
        SMTP_HOST: localhost
        SMTP_USERNAME: ci
        SMTP_PASSWORD: ci-password
      run: |
        cd backend
        nohup uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 > /tmp/backend.log 2>&1 &
        # Wait until /health (or root) responds
        for i in $(seq 1 30); do
          if curl -fsS http://localhost:8000/health >/dev/null 2>&1 || \
             curl -fsS http://localhost:8000/ >/dev/null 2>&1; then
            echo "backend is up"
            break
          fi
          echo "waiting for backend... ($i)"
          sleep 2
        done

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Install Playwright browsers
      run: |
        cd frontend
        # Default E2E coverage stays Chromium-first; Firefox is installed only
        # to add a second-browser run for the explicit axe accessibility smoke
        # file routed to the `firefox-a11y` project in frontend/playwright.config.js.
        npx playwright install --with-deps chromium firefox

    - name: Run E2E tests
      env:
        VITE_API_URL: http://localhost:8000/api/v2
        CI: "true"
        # Credentials for state-machine E2E specs (Wave 7/D.1)
        E2E_ADMIN_USERNAME: admin
        E2E_ADMIN_PASSWORD: ci_test_admin_password_2026
      run: |
        cd frontend
        npx playwright test

    - name: Upload backend log on failure
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: backend-log
        path: /tmp/backend.log
        if-no-files-found: ignore

    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: playwright-report
        path: frontend/playwright-report/
        if-no-files-found: ignore
        retention-days: 7

  pre-commit:
    name: pre-commit hygiene gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Wave 5b Task 1: runs the .pre-commit-config.yaml check bundle on
    # every push so developers who forgot `pre-commit install` locally
    # still get caught here. Closes Wave 5a exit note follow-up #10.

    steps:
    - uses: actions/checkout@v6

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install backend dependencies
      run: |
        cd backend
        uv sync --group dev --group test

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Install pre-commit
      run: pip install pre-commit

    - name: Run pre-commit on all files
      run: pre-commit run --all-files --show-diff-on-failure --config .pre-commit-config.yaml
